<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting — The Complete Guide to Reading the Iliad</title>
  <script>
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;
    var redirectUrl = 'https://readingtheiliad.com/?redirect=' + encodeURIComponent(path + search + hash);
    window.location.replace(redirectUrl);
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0;url=https://readingtheiliad.com/" />
  </noscript>
</head>
<body>
</body>
</html>
